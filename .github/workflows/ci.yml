name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-test-build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: erp_root_pw
          MYSQL_DATABASE: erp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -perp_root_pw"
          --health-interval=10s --health-timeout=5s --health-retries=10
    env:
      DATABASE_URL: mysql://root:erp_root_pw@127.0.0.1:3306/erp_test
      TEST_DATABASE_URL: mysql://root:erp_root_pw@127.0.0.1:3306/erp_test
      # قاعدة تحكّم منفصلة على نفس خدمة mysql (تعدّد الشركات — controlSchema.ts خارج
      # drizzle-kit push، تُهيَّأ بخطوة bootstrap-control-db.mjs مستقلّة أدناه).
      TEST_CONTROL_DATABASE_URL: mysql://root:erp_root_pw@127.0.0.1:3306/erp_control_test
      JWT_SECRET: ci_test_secret_change_me_0123456789abcdef
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Dependency vulnerability audit lives in its own workflow now (security.yml, via
      # OSV-Scanner) — it runs on the same push/PR triggers, so coverage is unchanged and
      # the build/test job no longer blocks on a separate, redundant audit step.
      - name: تهيئة مخطّط قاعدة الاختبار
        run: pnpm db:push
      - name: تَطبيق هَجرات يَدوية إضافية (GENERATED columns إلخ)
        run: node scripts/ci-apply-extra-migrations.mjs
      - name: تهيئة قاعدة التحكّم (تعدّد الشركات)
        run: node scripts/bootstrap-control-db.mjs
        env:
          CONTROL_DATABASE_URL: mysql://root:erp_root_pw@127.0.0.1:3306/erp_control_test
      - name: فحص الأنواع
        run: pnpm check
      - name: حارِس الإيموجي UI
        run: pnpm check:emoji
      - name: حارِس المخطّطات المالية (z.string العارية)
        run: pnpm check:money-schemas
      - name: حارِس الفرع الافتراضي الصامت
        run: pnpm check:branch
      - name: حارِس الإجراءات اليتيمة (DoD)
        run: pnpm check:orphans
      - name: حارِس حدود اليوم المحلية (TZ #٧)
        run: pnpm check:date-boundaries
      - name: الاختبارات
        run: pnpm test
      - name: بناء الإنتاج
        run: pnpm build
