name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-test-build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: erp_root_pw
          MYSQL_DATABASE: erp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -perp_root_pw"
          --health-interval=10s --health-timeout=5s --health-retries=10
    env:
      DATABASE_URL: mysql://root:erp_root_pw@127.0.0.1:3306/erp_test
      TEST_DATABASE_URL: mysql://root:erp_root_pw@127.0.0.1:3306/erp_test
      # قاعدة تحكّم منفصلة على نفس خدمة mysql (تعدّد الشركات — controlSchema.ts خارج
      # drizzle-kit push، تُهيَّأ بخطوة bootstrap-control-db.mjs مستقلّة أدناه).
      TEST_CONTROL_DATABASE_URL: mysql://root:erp_root_pw@127.0.0.1:3306/erp_control_test
      JWT_SECRET: ci_test_secret_change_me_0123456789abcdef
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit dependencies
        shell: bash
        run: |
          set +e
          OUT="$(pnpm audit --prod --audit-level high 2>&1)"; CODE=$?
          echo "$OUT"
          [ "$CODE" -eq 0 ] && exit 0
          # npm retired the legacy audit endpoint (HTTP 410). That is an npm
          # infrastructure outage, not a vulnerability finding — do NOT block
          # merges on it, but DO keep failing on real high-severity advisories.
          if echo "$OUT" | grep -qE "ERR_PNPM_AUDIT_BAD_RESPONSE|being retired|410"; then
            echo "::warning::pnpm audit endpoint unavailable (npm retired the legacy audit API); audit gate skipped this run. TODO: migrate to a maintained scanner (osv-scanner / npm audit)."
            exit 0
          fi
          exit "$CODE"
      - name: تهيئة مخطّط قاعدة الاختبار
        run: pnpm db:push
      - name: تَطبيق هَجرات يَدوية إضافية (GENERATED columns إلخ)
        run: node scripts/ci-apply-extra-migrations.mjs
      - name: تهيئة قاعدة التحكّم (تعدّد الشركات)
        run: node scripts/bootstrap-control-db.mjs
        env:
          CONTROL_DATABASE_URL: mysql://root:erp_root_pw@127.0.0.1:3306/erp_control_test
      - name: فحص الأنواع
        run: pnpm check
      - name: حارِس الإيموجي UI
        run: pnpm check:emoji
      - name: الاختبارات
        run: pnpm test
      - name: بناء الإنتاج
        run: pnpm build
