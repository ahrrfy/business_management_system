name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: erp_root_pw
          MYSQL_DATABASE: erp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Push schema to test DB
        run: pnpm db:push
        env:
          DATABASE_URL: mysql://root:erp_root_pw@127.0.0.1:3306/erp_test
          NODE_ENV: test

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: mysql://root:erp_root_pw@127.0.0.1:3306/erp_test
          JWT_SECRET: ci-test-secret-32-chars-minimum-len
          NODE_ENV: test
