name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # كل اثنين 6 ص UTC

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Dependency vulnerability audit via OSV-Scanner (Google, maintained) against the
      # OSV database. Replaces `pnpm audit`, whose legacy npm endpoint npm retired
      # (HTTP 410, see #192). Scans pnpm-lock.yaml directly (no install needed) and
      # fails the job when vulnerabilities are found.
      - name: Install osv-scanner (pinned v2.3.8 + checksum-verified)
        shell: bash
        run: |
          set -euo pipefail
          VER=v2.3.8
          SHA=bc98e15319ed0d515e3f9235287ba53cdc5535d576d24fd573978ecfe9ab92dc
          curl --fail --silent --show-error --location -o osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/${VER}/osv-scanner_linux_amd64"
          echo "${SHA}  osv-scanner" | sha256sum --check --status
          chmod +x osv-scanner
      - name: Audit dependencies against OSV database
        shell: bash
        run: ./osv-scanner scan --lockfile=pnpm-lock.yaml
