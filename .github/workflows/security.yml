name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # كل اثنين 6 ص UTC

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit production dependencies
        shell: bash
        run: |
          set +e
          OUT="$(pnpm audit --prod --audit-level high 2>&1)"; CODE=$?
          echo "$OUT"
          [ "$CODE" -eq 0 ] && exit 0
          # npm retired the legacy audit endpoint (HTTP 410). That is an npm
          # infrastructure outage, not a vulnerability finding — do NOT block
          # merges on it, but DO keep failing on real high-severity advisories.
          if echo "$OUT" | grep -qE "ERR_PNPM_AUDIT_BAD_RESPONSE|being retired|410"; then
            echo "::warning::pnpm audit endpoint unavailable (npm retired the legacy audit API); audit gate skipped this run. TODO: migrate to a maintained scanner (osv-scanner / npm audit)."
            exit 0
          fi
          exit "$CODE"
