# أنطقة حدود المعدّل في nginx — الجدار الخارجي قبل Node (سياق http، يُثبَّت في conf.d).
#
# الفلسفة: حدود التطبيق (express-rate-limit في server/index.ts) تبقى الجدار الدقيق لكل
# إجراء؛ وهذه الطبقة أرخص وأسبق — تصدّ الإغراق قبل أن يستهلك عملية Node أي CPU، وتغطي
# ما يستثنيه حدّ التطبيق أصلاً (مثل ‎/assets المُعفاة منه).
#
# هذا الملف يعرّف الأنطقة **فقط** — صفر أثر على بقية مواقع الخادم المشترك (سراج… إلخ):
# نطاق غير مُستعمَل في كتلة server لا يفعل شيئاً. التفعيل داخل كتلتَي server حصراً
# (انظر deploy/nginx-erp.conf و docs/cloudflare-plan.md). لا نضع هنا أي توجيه سلوكي
# (limit_req_status وغيرها) كي لا نغيّر افتراضيات مواقع الغير — تلك داخل كتلنا فقط.
#
# المفتاح = IP العميل ($binary_remote_addr). خلف Cloudflare يُسترجَع IP الزائر الحقيقي
# عبر snippets/alroya-cloudflare-realip.conf — فتبقى الحدود على الزائر لا على حافة CF.
#
# ⚠️ معايرة مقصودة لواقعنا: كل أجهزة الفرع خلف راوتر واحد = IP عام واحد يتشارك
# الميزانية (نفس درس LOGIN_RATE_LIMIT ‏٦/٧) ⇒ الأرقام سخيّة للاستخدام الشرعي المتزامن
# (القياس الفعلي: حدّ التطبيق ١٠٠٠ طلب/١٥د لكل IP يعمل اليوم بلا اختناق ≈ ١.١ط/ث —
# فسقف ٥٠ط/ث هنا أعلى منه بـ٤٥ ضعفاً) وضيّقة فقط على الإغراق الآلي.
#
# التثبيت (كـroot، من مجلد المستودع على الخادم):
#   cp deploy/nginx-ratelimit.conf /etc/nginx/conf.d/alroya-ratelimit-zones.conf
#   nginx -t && systemctl reload nginx        # reload لا restart — خادم مشترك

# تصفّح عام (صفحات + أصول مُجزّأة): فتح صفحة أول مرة = دفعة عشرات الحُزم ⇒ burst واسع
# في كتلة server (‏burst=120‏)، والأصول تُخبَّأ immutable بعدها فلا تتكرّر.
limit_req_zone $binary_remote_addr zone=alroya_general:10m rate=50r/s;

# سطح الـAPI‏ (‎/api/‏ — tRPC والطباعة): أبطأ طبيعياً (دفعات tRPC تجمع النداءات في طلب
# واحد) ⇒ سقف أدنى يحمي أغلى مسار معالجةً.
limit_req_zone $binary_remote_addr zone=alroya_api:10m rate=15r/s;

# سقف الاتصالات المتزامنة لكل IP‏ (HTTP/2 يضاعف القنوات داخل الاتصال الواحد ⇒ ٨٠ يسع
# عدّة أجهزة خلف IP فرعٍ واحد ويصدّ استنزاف slowloris).
limit_conn_zone $binary_remote_addr zone=alroya_conn:10m;
