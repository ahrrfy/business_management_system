# موقع nginx لنظام الرؤية العربية على VPS — يُثبَّت كملف *جديد* في sites-available
# (الخادم مشترك مع أنظمة أخرى: لا نعدّل ملفاتها، ولا نعيد تشغيل nginx — reload فقط).
#
# التثبيت (كـroot):
#   cp deploy/nginx-erp.conf /etc/nginx/sites-available/alroya-erp
#   ln -s /etc/nginx/sites-available/alroya-erp /etc/nginx/sites-enabled/alroya-erp
#   nginx -t && systemctl reload nginx
#   certbot --nginx --hsts -d srv1548487.hstgr.cloud   # شهادة + تحويل 80→443 + HSTS
#
# ملاحظات حرجة:
# - X-Forwarded-Proto إلزامي: الكوكي secure لا يُرسَل إلا إذا اكتشف الخادم HTTPS عبره.
# - Host إلزامي: فحص CSRF يطابق الأصل بالمضيف.
# - client_max_body_size: صور أوامر الشغل تُرسَل data URLs كبيرة.

server {
    listen 80;
    listen [::]:80;
    server_name srv1548487.hstgr.cloud;

    client_max_body_size 25m;

    # صحّة سريعة بلا سجلّ ضوضاء (المراقبة الخارجية تضرب هذا المسار كل دقيقة).
    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # لا WebSocket في الإنتاج (لا HMR)؛ tRPC والطباعة عبر HTTP عادي.
    }
}
