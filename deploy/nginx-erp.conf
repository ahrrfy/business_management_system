# موقع nginx لنظام الرؤية العربية على VPS — يُثبَّت كملف *جديد* في sites-available
# (الخادم مشترك مع أنظمة أخرى: لا نعدّل ملفاتها، ولا نعيد تشغيل nginx — reload فقط).
#
# التثبيت (كـroot) — **بالترتيب**: الأنطقة والمقتطف أولاً وإلا فشل nginx -t على include:
#   cp deploy/nginx-ratelimit.conf         /etc/nginx/conf.d/alroya-ratelimit-zones.conf
#   mkdir -p /etc/nginx/snippets
#   cp deploy/nginx-cloudflare-realip.conf /etc/nginx/snippets/alroya-cloudflare-realip.conf
#   cp deploy/nginx-erp.conf /etc/nginx/sites-available/alroya-erp
#   ln -s /etc/nginx/sites-available/alroya-erp /etc/nginx/sites-enabled/alroya-erp
#   nginx -t && systemctl reload nginx
#   certbot --nginx --hsts -d srv1548487.hstgr.cloud   # شهادة + تحويل 80→443 + HSTS
#
# ملاحظات حرجة:
# - X-Forwarded-Proto إلزامي: الكوكي secure لا يُرسَل إلا إذا اكتشف الخادم HTTPS عبره.
# - Host إلزامي: فحص CSRF يطابق الأصل بالمضيف.
# - client_max_body_size: صور أوامر الشغل تُرسَل data URLs كبيرة.
# - حدود المعدّل هنا (طبقة nginx) جدار خارجي فوق حدود التطبيق — معايرتها في
#   deploy/nginx-ratelimit.conf، وخطة Cloudflare الكاملة في docs/cloudflare-plan.md.

server {
    listen 80;
    listen [::]:80;
    server_name srv1548487.hstgr.cloud;

    client_max_body_size 25m;

    # IP الزائر الحقيقي خلف Cloudflare (بلا أثر قبل تفعيل CF على الدومين).
    include snippets/alroya-cloudflare-realip.conf;

    # حدود المعدّل (الأنطقة في conf.d/alroya-ratelimit-zones.conf): 429 لا 503 كي يفهم
    # العميل «كثرة طلبات» ويتراجع؛ التوجيهات هنا داخل كتلتنا فقط (خادم مشترك).
    limit_req_status  429;
    limit_conn_status 429;
    limit_req_log_level warn;
    limit_conn alroya_conn 80;
    limit_req  zone=alroya_general burst=120 nodelay;

    # صحّة سريعة بلا سجلّ ضوضاء (المراقبة الخارجية تضرب هذا المسار كل دقيقة).
    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # سطح الـAPI بسقف أدنى (alroya_api تحلّ محلّ alroya_general الموروثة في هذا الموقع —
    # nginx يستبدل limit_req الموروثة كلياً عند تعريف واحدة محلياً). proxy_pass لا يُورَّث
    # فتوجيهات البروكسي مكرَّرة نصّاً عمداً — أبقِها مطابقة لكتلة / أدناه.
    location /api/ {
        limit_req zone=alroya_api burst=60 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # لا WebSocket في الإنتاج (لا HMR)؛ tRPC والطباعة عبر HTTP عادي.
    }
}
