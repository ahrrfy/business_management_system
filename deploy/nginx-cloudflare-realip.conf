# استرجاع IP الزائر الحقيقي خلف Cloudflare — snippet يُضمَّن داخل كتلتَي server **لنا فقط**
# (لا في http العام — احتراماً لمواقع الخادم المشترك الأخرى).
#
# بدونه، بعد تحويل الدومين العام إلى Cloudflare يصير $remote_addr = IP حافة CF ⇒ كل زوّار
# العالم يتشاركون حفنة عناوين ⇒ حدود المعدّل (nginx والتطبيق معاً — express يقرأ XFF الذي
# يبنيه nginx من $remote_addr) تنقفل على الجميع دفعة واحدة = شلل فوري للمتجر.
#
# آمن قبل التفعيل: set_real_ip_from لا يعمل إلا على اتصالات قادمة من هذه النطاقات حصراً —
# ما دام الدومين لا يمرّ عبر CF فهذا الملف بلا أثر إطلاقاً. ثبّته **قبل** تحويل DNS.
#
# التثبيت (كـroot، من مجلد المستودع على الخادم):
#   nginx -V 2>&1 | grep -o with-http_realip_module   # تأكد أن الوحدة مبنيّة (قياسية في أوبونتو)
#   mkdir -p /etc/nginx/snippets
#   cp deploy/nginx-cloudflare-realip.conf /etc/nginx/snippets/alroya-cloudflare-realip.conf
#   # ثم داخل كل كتلة server لنا (alroya-erp + موقع alarabiya.online):
#   #   include snippets/alroya-cloudflare-realip.conf;
#   nginx -t && systemctl reload nginx
#
# النطاقات الرسمية من https://www.cloudflare.com/ips (لقطة ٢٠/٧/٢٠٢٦) — تتغيّر نادراً جداً؛
# عند أي شك حدّثها من المصدر نفسه ثم reload.

