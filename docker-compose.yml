# docker-compose للإنتاج — MySQL 8 مع تخزين دائم (named volume) لمنع فقد البيانات.
#
# السبب (CLAUDE.md §٩): حاوية erp-mysql القديمة أُنشئت بلا volume ⇒ `docker rm` يمحو كل
# البيانات نهائياً. هذا الملف يربط البيانات بـnamed volume مستقلّ عن دورة حياة الحاوية،
# فيبقى المخزون والفواتير والذمم سالمة حتى عند هدم الحاوية وإعادة بنائها.
#
# الاستخدام:
#   docker compose up -d           # تشغيل (يُنشئ القاعدة في أول مرة)
#   docker compose down            # إيقاف (البيانات تبقى في الـvolume)
#   docker compose down -v         # ⛔ خطر: يحذف الـvolume والبيانات معه — لا تستعمله إلا عمداً
#
# الترحيل الآمن من الحاوية القديمة بلا volume: راجع docs/disaster-recovery.md (قسم «الترحيل»).

services:
  mysql:
    image: mysql:8.0
    container_name: ${DB_CONTAINER:-erp-mysql}
    restart: unless-stopped
    environment:
      # لا كلمة مرور افتراضية مَخبوءة: يجب ضبط DB_ROOT_PW (في .env) وإلا يفشل الإقلاع بوضوح
      # بدل تشغيل قاعدة بكلمة مرور معروفة. راجع .env.example.
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PW:?DB_ROOT_PW مطلوب — اضبطه في .env (مثال: openssl rand -hex 24)}
      MYSQL_DATABASE: ${DB_NAME:-erp}
    ports:
      # G1 (أخطر إصلاح): الربط على الحلقة المحلية فقط — Docker يثقب جدار النار (ufw) ويكشف
      # المنفذ للإنترنت العلني إن رُبط على كل الواجهات. التطبيق على نفس المضيف فلا يحتاج أكثر.
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    volumes:
      - erp_data:/var/lib/mysql
    # تدوير سجلّ الحاوية — بلا حدّ يلتهم القرص مع الزمن (G13).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      # 512M للتطوير المحلي؛ الإنتاج يضبط DB_BUFFER_POOL=2G في .env (خادم مشترك — لا نلتهم ذاكرة الغير).
      - --innodb-buffer-pool-size=${DB_BUFFER_POOL:-512M}
      # binlog صريح (لا اعتماداً على افتراضيٍ قابلٍ للتعطيل الصامت) لاستعادة نقطة-زمنية (G3).
      - --log-bin=mysql-bin
      # احتفاظ binlog: افتراضي MySQL (٣٠ يوماً) محلياً؛ الإنتاج يضبط DB_BINLOG_EXPIRE=259200 (٣ أيام).
      - --binlog-expire-logs-seconds=${DB_BINLOG_EXPIRE:-2592000}
      # مهلة انتظار قفل الصفوف: افتراضي MySQL (50ث) محلياً؛ الإنتاج يضبط DB_LOCK_WAIT=10 كي لا
      # يتعلّق الكاشير خلف قفل .for("update") طويل (G12).
      - --innodb-lock-wait-timeout=${DB_LOCK_WAIT:-50}
    healthcheck:
      # يتأكّد أنّ القاعدة تستجيب فعلاً قبل أن يعتمد عليها التطبيق.
      # كلمة المرور عبر MYSQL_PWD داخل الشِل لا عبر argv — ps على المضيف يكشف عمليات الحاويات،
      # وعلى خادم مشترك كانت تظهر لكل مستخدم كل ١٠ ثوانٍ ($$ تهريب compose ⇒ يتوسّع داخل الحاوية فقط).
      test: ["CMD-SHELL", "MYSQL_PWD=\"$$MYSQL_ROOT_PASSWORD\" mysqladmin ping -h localhost -uroot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  # named volume مُدار من Docker — يعيش مستقلّاً عن الحاوية. لا يُحذف بـ`docker rm`.
  erp_data:
    name: erp_data
